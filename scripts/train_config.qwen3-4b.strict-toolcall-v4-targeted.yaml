# Targeted strict tool-call promotion attempt for Qwen3 4B.
# Adds non-heldout examples for exact message extraction and nested object-array JSON.
model: Qwen/Qwen3-4B-MLX-4bit
adapter_path: experiments/qwen3-4b-strict-toolcall-v4-targeted/lora_adapter
data: data/strict_tool_call/expanded_splits_v4_targeted
lora_rank: 8
lora_scale: 16.0
lora_dropout: 0.0
lora_layers: 8
batch_size: 1
iters: 140
val_batches: 5
steps_per_report: 10
steps_per_eval: 10
steps_per_save: 20
max_seq_length: 1024
learning_rate: 3.0e-5
grad_checkpoint: true
grad_accumulation_steps: 4
seed: 47
