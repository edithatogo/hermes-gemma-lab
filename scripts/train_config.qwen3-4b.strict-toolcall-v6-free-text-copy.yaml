# Free-text-copy strict tool-call promotion attempt for Qwen3 4B.
# Starts from v5 pilot polish and adds non-heldout examples where short
# user-provided message/note/reason strings must be copied exactly into
# tool-call arguments.
model: Qwen/Qwen3-4B-MLX-4bit
adapter_path: experiments/qwen3-4b-strict-toolcall-v6-free-text-copy/lora_adapter
data: data/strict_tool_call/expanded_splits_v6_free_text_copy
lora_rank: 8
lora_scale: 16.0
lora_dropout: 0.0
lora_layers: 8
batch_size: 1
iters: 170
val_batches: 5
steps_per_report: 10
steps_per_eval: 10
steps_per_save: 25
max_seq_length: 1024
learning_rate: 3.0e-5
grad_checkpoint: true
grad_accumulation_steps: 4
seed: 59
