model: Qwen/Qwen3-4B-MLX-4bit
adapter_path: experiments/qwen3-4b-strict-toolcall-v8-wrapper-copy-refusal-repair/lora_adapter
data: data/strict_tool_call/expanded_splits_v8_wrapper_copy_refusal_repair
