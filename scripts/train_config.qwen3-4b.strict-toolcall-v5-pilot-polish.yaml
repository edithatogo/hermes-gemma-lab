# Invalid-tool-polish strict tool-call promotion attempt for Qwen3 4B.
# Starts from v4-targeted data and adds non-heldout strict-compatible examples
# for unsupported-tool refusal wording. Broader instruction-following polish is
# intentionally excluded from this strict tool-call dataset.
model: Qwen/Qwen3-4B-MLX-4bit
adapter_path: experiments/qwen3-4b-strict-toolcall-v5-pilot-polish/lora_adapter
data: data/strict_tool_call/expanded_splits_v5_pilot_polish
lora_rank: 8
lora_scale: 16.0
lora_dropout: 0.0
lora_layers: 8
batch_size: 1
iters: 150
val_batches: 5
steps_per_report: 10
steps_per_eval: 10
steps_per_save: 25
max_seq_length: 1024
learning_rate: 3.0e-5
grad_checkpoint: true
grad_accumulation_steps: 4
seed: 53
