# Expanded strict tool-call promotion attempt for Qwen3 4B.
# Trains on the deterministic expanded strict tool-call splits and must be
# evaluated on benchmarks/tool_call_local/heldout_suite.json.
model: Qwen/Qwen3-4B-MLX-4bit
adapter_path: experiments/qwen3-4b-strict-toolcall-expanded/lora_adapter
data: data/strict_tool_call/expanded_splits_v1
lora_rank: 8
lora_scale: 16.0
lora_dropout: 0.0
lora_layers: 8
batch_size: 1
iters: 120
val_batches: 4
steps_per_report: 10
steps_per_eval: 10
steps_per_save: 10
max_seq_length: 2048
learning_rate: 4e-5
grad_checkpoint: true
grad_accumulation_steps: 4
seed: 45
